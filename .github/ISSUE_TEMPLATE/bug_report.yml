name: Bug report
description: Something in an example is broken or behaves unexpectedly.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the problem.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands, environment, MCP server versions.
      placeholder: |
        1. cd examples/foo
        2. npm install
        3. node index.js
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include full error output and stack traces if any.
    validations:
      required: true
